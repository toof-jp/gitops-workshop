apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-sample-metrics-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/toof-jp/gitops-workshop.git
    targetRevision: main
    path: manifests/go-sample-metrics-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
