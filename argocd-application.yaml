---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/toof-jp/gitops-workshop.git
    targetRevision: main
    path: manifests/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true      # Gitから削除されたリソースをクラスタからも削除
      selfHeal: true   # 手動変更を自動で元に戻す
